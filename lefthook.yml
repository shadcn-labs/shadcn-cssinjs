pre-commit:
  jobs:
    - name: format
      run: pnpm exec oxfmt --write {staged_files}
      glob:
        - "apps/www/**/*.js"
        - "apps/www/**/*.jsx"
        - "apps/www/**/*.ts"
        - "apps/www/**/*.tsx"
        - "apps/www/**/*.json"
        - "apps/www/**/*.jsonc"
        - "apps/www/**/*.css"
      stage_fixed: true
    - name: lint
      run: pnpm exec oxlint --fix {staged_files}
      glob:
        - "apps/www/**/*.js"
        - "apps/www/**/*.jsx"
        - "apps/www/**/*.ts"
        - "apps/www/**/*.tsx"
      stage_fixed: true
